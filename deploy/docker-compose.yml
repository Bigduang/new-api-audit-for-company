services:
  token-audit:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: token-audit
    restart: always
    env_file:
      - ../.env
    volumes:
      - ../data:/data
    networks:
      - newapi-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  newapi-network:
    external: true
    name: proxy_newapi-network
